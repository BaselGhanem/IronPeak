<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GoldenPeak Capital - Premium FinTech</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap');
    
    /* --- Design System & Theming --- */
    :root {
      --bg-base-dark: #060a0f; --bg-surface-dark: rgba(13, 22, 33, 0.6);
      --glass-border-dark: rgba(255, 255, 255, 0.08); --glass-highlight-dark: rgba(255, 255, 255, 0.1);
      --text-main-dark: #F8FAFC; --text-muted-dark: #94A3B8;
      --teal-glow-dark: rgba(0, 166, 147, 0.3); --gold-glow-dark: rgba(212, 175, 55, 0.2);
      
      --bg-base-light: #f1f5f9; --bg-surface-light: rgba(255, 255, 255, 0.7);
      --glass-border-light: rgba(0, 0, 0, 0.08); --glass-highlight-light: rgba(0, 0, 0, 0.05);
      --text-main-light: #0f172a; --text-muted-light: #64748b;
      --teal-glow-light: rgba(0, 166, 147, 0.15); --gold-glow-light: rgba(212, 175, 55, 0.15);

      --deep-teal: #002b24; --primary-teal: #00A693; --gold-premium: #D4AF37; --gold-light: #F9E596;
      --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --info: #3b82f6;
      
      --font-primary: 'Tajawal', 'Almarai', sans-serif; --font-heading: 'Almarai', sans-serif;
      --transition-fast: 0.2s ease;
    }
    
    html[data-theme="dark"] {
      --bg-base: var(--bg-base-dark); --bg-surface: var(--bg-surface-dark);
      --glass-border: var(--glass-border-dark); --glass-highlight: var(--glass-highlight-dark);
      --text-main: var(--text-main-dark); --text-muted: var(--text-muted-dark);
      --bg-glow-1: var(--teal-glow-dark); --bg-glow-2: var(--gold-glow-dark);
      --chart-grid: rgba(255,255,255,0.05); --input-bg: rgba(0,0,0,0.3);
    }

    html[data-theme="light"] {
      --bg-base: var(--bg-base-light); --bg-surface: var(--bg-surface-light);
      --glass-border: var(--glass-border-light); --glass-highlight: var(--glass-highlight-light);
      --text-main: var(--text-main-light); --text-muted: var(--text-muted-light);
      --bg-glow-1: var(--teal-glow-light); --bg-glow-2: var(--gold-glow-light);
      --chart-grid: rgba(0,0,0,0.05); --input-bg: rgba(255,255,255,0.5);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: var(--font-primary); background-color: var(--bg-base); color: var(--text-main);
      min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
      transition: background-color 0.5s ease, color 0.5s ease; line-height: 1.6;
    }

    html[dir="ltr"] body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    html[dir="ltr"] .form-label { right: auto; left: 16px; transform-origin: left top; }
    html[dir="rtl"] .form-label { left: auto; right: 16px; transform-origin: right top; }
    html[dir="ltr"] .form-control:focus ~ .form-label, html[dir="ltr"] .form-control:not(:placeholder-shown) ~ .form-label { right: auto; left: 12px; }
    html[dir="rtl"] .form-control:focus ~ .form-label, html[dir="rtl"] .form-control:not(:placeholder-shown) ~ .form-label { left: auto; right: 12px; }
    html[dir="ltr"] th, html[dir="ltr"] td { text-align: left; }
    html[dir="rtl"] th, html[dir="rtl"] td { text-align: right; }

    .background-pattern {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at 15% 20%, var(--bg-glow-1) 0%, transparent 40%), radial-gradient(circle at 85% 80%, var(--bg-glow-2) 0%, transparent 40%);
      filter: blur(80px); opacity: 0.8; animation: pulseGlow 15s infinite alternate; transition: background 0.5s ease;
    }
    @keyframes pulseGlow { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.15); opacity: 1; } }

    /* Login Screen */
    #loginScreen {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg-base);
      display: flex; justify-content: center; align-items: center; transition: opacity 0.6s ease;
    }
    .login-box {
      background: var(--bg-surface); padding: 50px 40px; border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3); width: 90%; max-width: 420px; border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px); text-align: center; animation: floatUp 0.8s ease-out forwards;
    }
    @keyframes floatUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    .login-logo { margin-bottom: 30px; cursor: pointer; user-select: none; }
    .custom-logo-img { max-height: 80px; margin: 0 auto; display: block; border-radius: 12px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }

    /* Modern Navigation */
    .modern-nav {
      position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-surface);
      backdrop-filter: blur(24px); border-bottom: 1px solid var(--glass-border); z-index: 1000;
    }
    .nav-container { max-width: 1400px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; }
    .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .nav-logo img { max-height: 40px; }
    .nav-menu { display: flex; gap: 8px; flex: 1; justify-content: center; }
    .nav-actions { display: flex; gap: 15px; align-items: center; }
    .nav-link {
      text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 1.05rem;
      padding: 10px 18px; border-radius: 12px; transition: var(--transition-fast); cursor: pointer;
      border: 1px solid transparent; background: transparent; display: flex; align-items: center; gap: 8px;
    }
    .nav-link:hover { color: var(--text-main); background: var(--glass-highlight); }
    .nav-link.active { color: var(--gold-premium); background: var(--glass-highlight); border-color: var(--glass-border); }
    .icon-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); padding: 10px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; width: 42px; height: 42px; transition: 0.2s;}
    .icon-btn:hover { background: var(--glass-highlight); color: var(--gold-premium); }
    
    .user-profile-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold-premium); display: none; }

    /* Forms */
    .premium-card { background: var(--bg-surface); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); }
    .form-group { position: relative; margin-bottom: 28px; }
    .form-control { width: 100%; padding: 18px 16px 14px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 14px; font-family: inherit; font-size: 1.15rem; color: var(--text-main); font-weight: 600; }
    html[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; cursor: pointer; }
    .form-control:focus { outline: none; border-color: var(--gold-premium); background: var(--bg-base); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
    .form-control::placeholder { color: transparent; }
    .form-label { position: absolute; top: 18px; color: var(--text-muted); pointer-events: none; font-size: 1.05rem; font-weight: 600; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
    .form-control:focus ~ .form-label, .form-control:not(:placeholder-shown) ~ .form-label { transform: translateY(-30px) scale(0.85); color: var(--gold-premium); background: var(--bg-surface); padding: 0 10px; border-radius: 6px; border: 1px solid var(--glass-border); font-weight: 700; }
    .btn-submit { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold-premium), #b8860b); color: #000; border: none; border-radius: 14px; font-size: 1.25rem; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4); }

    /* Layout */
    #appContainer { display: none; }
    .main-content { max-width: 1400px; margin: 120px auto 60px; padding: 0 20px; flex: 1; width: 100%; }
    .tab-content { display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease; }
    .tab-content.active { display: block; opacity: 1; transform: translateY(0); animation: slideUp 0.5s ease forwards; }

    /* Stepper */
    .stepper-wrapper { display: flex; align-items: center; position: relative; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 14px; transition: 0.2s; }
    .stepper-wrapper:focus-within { border-color: var(--gold-premium); background: var(--bg-base); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
    .stepper-btn { background: transparent; border: none; color: var(--gold-premium); font-size: 1.4rem; padding: 15px 25px; cursor: pointer; }
    .stepper-input { flex: 1; border: none; background: transparent; text-align: center; font-size: 1.3rem; font-weight: 800; color: var(--text-main); outline: none; padding: 18px 10px 14px; font-family: inherit; }
    .stepper-label { position: absolute; top: -14px; right: 20px; background: var(--bg-surface); padding: 2px 10px; font-size: 0.9rem; font-weight: 700; border-radius: 6px; border: 1px solid var(--glass-border); z-index: 2; }
    
    .live-preview-box { background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.05)); border: 1px dashed var(--gold-premium); border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 25px; }

    /* Dashboards */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { padding: 30px 25px; text-align: center; display: flex; flex-direction: column; align-items: center; border-bottom: 4px solid transparent; }
    .stat-icon { font-size: 2.5rem; margin-bottom: 15px; }
    .stat-title { font-size: 1.15rem; color: var(--text-muted); font-weight: 700; }
    .stat-value { font-size: 2.2rem; font-weight: 800; font-family: var(--font-heading); }
    .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 30px; }
    .chart-wrapper { padding: 25px; height: 480px; }

    /* Tables */
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 900px; }
    th { padding: 18px 15px; color: var(--text-muted); font-weight: 800; border-bottom: 2px solid var(--glass-border); background: var(--glass-highlight); }
    td { padding: 18px 15px; background: var(--bg-surface); font-weight: 600; border-top: 1px solid transparent; border-bottom: 1px solid transparent; }
    tr:hover td { background: var(--glass-highlight); border-color: var(--glass-border); }
    .net-profit-cell { font-weight: 800; color: var(--gold-premium); font-size: 1.2rem; }
    .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; display: inline-block; }

    /* Admin Grid */
    .admin-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
    @media(min-width: 1024px) { .admin-grid { grid-template-columns: 1fr 1fr; } }
    .admin-section { padding: 30px; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 24px; }
    .admin-section-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 25px; color: var(--text-main); border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; display: flex; gap:10px; align-items:center; }
    .admin-section-title i { color: var(--gold-premium); }

    /* Toasts */
    .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column-reverse; gap: 10px; pointer-events: none;}
    .toast { background: var(--bg-surface); border: 1px solid var(--glass-border); padding: 16px 24px; border-radius: 16px; opacity: 0; transform: translateY(30px); transition: 0.4s; font-weight: 700; color:#fff;}
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-bottom: 3px solid var(--success); }
    .toast.error { border-bottom: 3px solid var(--danger); }
  </style>
</head>
<body>
  <div class="background-pattern"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo" ondblclick="window.initSystem()">
        <img class="custom-logo-img" src="https://raw.githubusercontent.com/BaselGhanem/IronPeak/refs/heads/main/GoldenPeakLogo.png">
      </div>
      <h3 style="margin-bottom: 25px; color: var(--text-muted); font-weight: 700;" data-i18n="loginTitle">تسجيل الدخول للنظام</h3>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginUser" class="form-control" required placeholder=" ">
          <label class="form-label" data-i18n="username">اسم المستخدم</label>
        </div>
        <div class="form-group">
          <input type="password" id="loginPass" class="form-control" required placeholder=" ">
          <label class="form-label" data-i18n="password">كلمة المرور</label>
        </div>
        <button type="submit" class="btn-submit" id="loginBtnSpinner"><span data-i18n="loginBtn">دخول آمن</span></button>
      </form>
    </div>
  </div>

  <div id="appContainer">
    <nav class="modern-nav">
      <div class="nav-container">
        <div class="nav-logo" onclick="window.switchTab('analytics')">
          <img src="https://raw.githubusercontent.com/BaselGhanem/IronPeak/refs/heads/main/GoldenPeakLogo.png">
        </div>
        <div class="nav-actions">
          <img id="navProfilePic" class="user-profile-pic" src="">
          <span id="currentUserDisplay" style="color: var(--text-muted); font-weight: 700; margin-inline-end: 10px; font-size: 1.05rem;"></span>
          <button class="icon-btn" onclick="window.toggleTheme()"><i class="fa-regular fa-moon" id="themeBtn"></i></button>
          <button class="icon-btn" onclick="window.toggleLanguage()"><i class="fa-solid fa-language"></i></button>
          <button class="icon-btn" onclick="window.logout()"><i class="fa-solid fa-power-off" style="color: var(--danger)"></i></button>
        </div>
      </div>
      <div class="nav-menu">
        <button class="nav-link active" onclick="window.switchTab('analytics')" id="navAnalytics"><i class="fa-solid fa-chart-pie"></i> <span data-i18n="navAnalytics">لوحة القيادة</span></button>
        <button class="nav-link" onclick="window.switchTab('input')" id="navInput" style="display:none;"><i class="fa-solid fa-pen-nib"></i> <span data-i18n="navInput">إدخال الأرباح</span></button>
        <button class="nav-link" onclick="window.switchTab('market')" id="navMarket"><i class="fa-solid fa-chart-line"></i> <span data-i18n="navMarket">الأسواق</span></button>
        <button class="nav-link" onclick="window.switchTab('transactions')" id="navHistory"><i class="fa-solid fa-clock-rotate-left"></i> <span data-i18n="navHistory">السجل المالي</span></button>
        <button class="nav-link" onclick="window.switchTab('admin')" id="navAdmin" style="display:none;"><i class="fa-solid fa-user-gear"></i> <span data-i18n="navAdmin">إدارة النظام</span></button>
      </div>
    </nav>

    <main class="main-content">
      
      <section id="analytics" class="tab-content active">
        <div style="text-align:center; margin-bottom:30px; margin-top:35px;">
          <h1 style="font-family:var(--font-heading); font-size:2.2rem; font-weight:800;" id="greetingName"></h1>
          <p style="color:var(--text-muted); font-size:1.1rem;" data-i18n="greetingSub">إليك ملخص الأداء المالي.</p>
        </div>
        <div class="cards-grid" id="analyticsCardsGrid"></div>
        <div class="charts-container">
          <div class="premium-card chart-wrapper">
            <div class="chart-title"><i class="fa-solid fa-chart-column"></i> <span data-i18n="chartMonthly">الأداء الشهري للشركاء</span></div>
            <div style="position:relative; height:85%; width:100%;"><canvas id="monthlyChart"></canvas></div>
          </div>
          <div class="premium-card chart-wrapper">
            <div class="chart-title"><i class="fa-solid fa-chart-area"></i> <span data-i18n="chartDaily">صافي الربح اليومي والتراكمي</span></div>
            <div style="position:relative; height:85%; width:100%;"><canvas id="dailyCumulativeChart"></canvas></div>
          </div>
        </div>
      </section>

      <section id="input" class="tab-content">
        <div class="premium-card form-container">
          <div style="text-align:center; margin-bottom:35px;">
            <h2 style="font-family:var(--font-heading); font-size:1.8rem; font-weight:800;" data-i18n="inputTitle">إدخال أرباح جديدة</h2>
            <p style="color:var(--text-muted);" data-i18n="inputDesc">أدخل صافي الأرباح ليتم توزيعها على الشركاء</p>
          </div>
          <form id="entryForm">
            <input type="hidden" id="editEntryId">
            <div class="form-group">
              <input type="date" id="date" class="form-control" required placeholder=" ">
              <label class="form-label" data-i18n="date">التاريخ</label>
            </div>
            <div class="form-group" style="margin-bottom:40px; padding-bottom:25px; border-bottom:1px dashed var(--glass-border);">
              <label style="font-size:1.1rem; font-weight:800; display:block; margin-bottom:10px;" data-i18n="autoDistribute">توزيع تلقائي (إجمالي الربح)</label>
              <div class="stepper-wrapper"><input type="number" id="masterNetProfit" class="stepper-input" step="1" placeholder="0.00"></div>
            </div>
            <div id="dynamicPartnerInputs"></div>
            <div class="live-preview-box">
              <span data-i18n="liveTotal">إجمالي الربح الصافي</span>
              <h3 id="liveTotalAmount">0.00</h3>
            </div>
            <button type="submit" class="btn-submit" id="saveDataBtn"><i class="fa-solid fa-check-double"></i> <span data-i18n="saveBtn">اعتماد وحفظ البيانات</span></button>
            <button type="button" class="btn-submit" id="cancelEditBtn" style="display:none; margin-top:15px; background:var(--bg-surface); color:var(--danger); border:1px solid var(--danger); box-shadow:none;" onclick="window.cancelEditing()"><span data-i18n="cancelEdit">إلغاء التعديل</span></button>
          </form>
        </div>
      </section>

      <section id="market" class="tab-content">
        <div class="premium-card" style="padding: 20px;">
          <div style="display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;">
            <button class="icon-btn active" style="width:auto; padding:10px 20px; border-radius:12px; font-weight:bold;" onclick="window.loadMarket('OANDA:XAUUSD')">الذهب</button>
            <button class="icon-btn" style="width:auto; padding:10px 20px; border-radius:12px; font-weight:bold;" onclick="window.loadMarket('BINANCE:BTCUSDT')">Bitcoin</button>
          </div>
          <div id="tv_container" style="height:650px; padding:10px;"></div>
        </div>
      </section>

      <section id="transactions" class="tab-content">
        <div class="premium-card table-container">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="font-family:var(--font-heading); color:var(--gold-premium);"><i class="fa-solid fa-list-check"></i> <span data-i18n="historyTitle">السجل المالي</span></h2>
            <button class="btn-submit" style="width:auto; padding:10px 20px; font-size:1rem;" onclick="window.exportToExcel()"><i class="fa-solid fa-file-excel"></i> <span data-i18n="exportBtn">تصدير Excel</span></button>
          </div>
          <table id="dataTable">
            <thead><tr id="tableHeaderRow"></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="admin" class="tab-content">
        <div class="admin-grid">
          
          <div style="display:flex; flex-direction:column; gap:30px;">
            <div class="admin-section">
               <h2 class="admin-section-title"><i class="fa-solid fa-vault"></i> <span data-i18n="manageCapital">إدارة رأس المال</span></h2>
               <form id="capitalForm" style="display:grid; gap:20px;">
                 <div class="form-group" style="margin-bottom:0;"><input type="number" id="cap_amount" class="form-control" step="0.01" required placeholder=" "><label class="form-label" data-i18n="capAmount">المبلغ</label></div>
                 <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                   <div class="form-group" style="margin-bottom:0;"><input type="date" id="cap_date" class="form-control" required placeholder=" "><label class="form-label" data-i18n="date">التاريخ</label></div>
                   <div class="form-group" style="margin-bottom:0;">
                     <select id="cap_type" class="form-control" style="appearance:none; cursor:pointer;">
                        <option value="increase" data-i18n="capIncrease">إيداع / زيادة</option>
                        <option value="decrease" data-i18n="capDecrease">سحب / تخفيض</option>
                     </select>
                     <label class="form-label" style="top:-10px; background:var(--bg-surface); padding:0 5px;" data-i18n="capType">نوع الحركة</label>
                   </div>
                 </div>
                 <div class="form-group" style="margin-bottom:0;"><input type="text" id="cap_note" class="form-control" placeholder=" "><label class="form-label" data-i18n="capNote">ملاحظة</label></div>
                 <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> <span data-i18n="saveCapBtn">حفظ الحركة</span></button>
               </form>
               <div style="margin-top:25px; max-height:250px; overflow-y:auto;" id="capitalHistoryList"></div>
            </div>

            <div class="admin-section">
              <h2 class="admin-section-title"><i class="fa-solid fa-user-plus"></i> <span data-i18n="addPartnerTitle">تعريف/تعديل شريك</span></h2>
              <form id="addPartnerForm" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="form-group" style="grid-column:1/-1; margin-bottom:0;"><input type="text" id="p_username" class="form-control" required placeholder=" "><label class="form-label" data-i18n="pUsername">اسم الدخول (بدون @)</label></div>
                <div class="form-group" style="margin-bottom:0;"><input type="text" id="p_password" class="form-control" required placeholder=" "><label class="form-label" data-i18n="pPassword">كلمة المرور</label></div>
                <div class="form-group" style="margin-bottom:0;"><input type="color" id="p_color" value="#00A693" style="width:100%; height:55px; border-radius:12px; border:1px solid var(--glass-border); background:transparent; padding:5px;"><label class="form-label" style="top:-10px; background:var(--bg-surface); padding:0 5px;" data-i18n="pColor">اللون</label></div>
                <div class="form-group" style="margin-bottom:0;"><input type="text" id="p_nameAr" class="form-control" required placeholder=" "><label class="form-label" data-i18n="pNameAr">الاسم عربي</label></div>
                <div class="form-group" style="margin-bottom:0;"><input type="text" id="p_nameEn" class="form-control" required placeholder=" "><label class="form-label" data-i18n="pNameEn">الاسم إنجليزي</label></div>
                <div class="form-group" style="grid-column:1/-1; margin-bottom:0;">
                  <input type="file" id="p_photo" class="form-control" accept="image/*" style="padding-top:12px;">
                  <label class="form-label" style="top:-10px; background:var(--bg-surface); padding:0 5px;">الصورة الشخصية (تخزن في المتصفح محلياً)</label>
                </div>
                <button type="submit" class="btn-submit" style="grid-column:1/-1;"><i class="fa-solid fa-save"></i> <span data-i18n="addPartnerBtn">حفظ الشريك</span></button>

            </div>
          </div>

          <div class="admin-section" style="align-self:start;">
            <h2 class="admin-section-title"><i class="fa-solid fa-percent"></i> <span data-i18n="distributePercentages">توزيع النسب</span></h2>
            <form id="percentagesForm">
              <div id="adminPercentagesList" style="display:flex; flex-direction:column; gap:10px;"></div>
              <div style="margin-top:20px; display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem;">
                <span data-i18n="totalSum">المجموع الكلي:</span> <span id="percTotalDisplay" style="color:var(--danger)">0%</span>
              </div>
              <button type="submit" id="savePercBtn" class="btn-submit" style="margin-top:20px;" disabled><i class="fa-solid fa-check"></i> <span data-i18n="savePercBtn">اعتماد النسب</span></button>
            </form>
          </div>

        </div>
      </section>

    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCxuFGMSbDEOVjy1buAM4i6XeJ57FIGuiY",
  authDomain: "goldenpeak-f8a0d.firebaseapp.com",
  projectId: "goldenpeak-f8a0d",
  storageBucket: "goldenpeak-f8a0d.firebasestorage.app",
  messagingSenderId: "935788401204",
  appId: "1:935788401204:web:448b2521962ac533807061"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const secondaryApp = initializeApp(firebaseConfig, "Secondary");
    const secondaryAuth = getAuth(secondaryApp);

    // Global State
    let ironPeakLang = localStorage.getItem('ironPeakLang') || 'ar';
    let currentTheme = localStorage.getItem('ironPeakTheme') || 'dark';
    let currentUser = null;
    
    let ironPeakPartners = {};
    let ironPeakData = [];
    let ironPeakCapital = [];
    let filteredData = [];
    
    let monthlyChartInstance = null;
    let dailyChartInstance = null;

    const dict = {
      ar: {
        loginTitle: "تسجيل الدخول للنظام", username: "اسم المستخدم", password: "كلمة المرور", loginBtn: "دخول آمن",
        navAnalytics: "لوحة القيادة", navInput: "إدخال الأرباح", navMarket: "الأسواق", navHistory: "السجل المالي", navAdmin: "إدارة النظام",
        greetingMorning: "صباح الخير،", greetingAfternoon: "طاب مساؤك،", greetingEvening: "مساء الخير،", greetingSub: "إليك ملخص الأداء المالي.",
        activeCapital: "رأس المال النشط", netProfit: "إجمالي الأرباح", profitShare: "حصة", currency: "JD",
        chartMonthly: "الأداء الشهري للشركاء", chartDaily: "صافي الربح اليومي",
        inputTitle: "إدخال أرباح", inputDesc: "إدخال وتوزيع الأرباح اليومية", date: "التاريخ", autoDistribute: "توزيع تلقائي", liveTotal: "إجمالي العملية", saveBtn: "حفظ البيانات", updateBtn: "تحديث", cancelEdit: "إلغاء",
        historyTitle: "السجل المالي", exportBtn: "تصدير", filterFrom: "من", filterTo: "إلى", applyFilter: "تطبيق", resetFilter: "إلغاء", clearBtn: "مسح",
        thDate: "التاريخ", thMonth: "الشهر", thNet: "صافي الربح", thActions: "إجراءات", emptyData: "لا توجد بيانات",
        manageCapital: "إدارة رأس المال", capAmount: "المبلغ", capIncrease: "إيداع", capDecrease: "سحب", capType: "النوع", capNote: "ملاحظة", saveCapBtn: "حفظ",
        addPartnerTitle: "تعريف شريك", pUsername: "اسم الدخول", pPassword: "الباسورد", pColor: "اللون", pNameAr: "الاسم عربي", pNameEn: "الاسم E", addPartnerBtn: "حفظ",
        distributePercentages: "توزيع النسب", totalSum: "المجموع:", savePercBtn: "اعتماد",
        errLogin: "بيانات خاطئة", succLogin: "تم الدخول", succSave: "تم الحفظ", succDel: "تم الحذف", succImg: "تم حفظ الصورة محلياً"
      },
      en: {
        loginTitle: "System Login", username: "Username", password: "Password", loginBtn: "Secure Login",
        navAnalytics: "Dashboard", navInput: "Input Profits", navMarket: "Markets", navHistory: "History", navAdmin: "Admin",
        greetingMorning: "Good Morning,", greetingAfternoon: "Good Afternoon,", greetingEvening: "Good Evening,", greetingSub: "Your financial summary.",
        activeCapital: "Active Capital", netProfit: "Total Profit", profitShare: "Share of", currency: "JD",
        chartMonthly: "Monthly Performance", chartDaily: "Daily Net Profit",
        inputTitle: "Enter Profits", inputDesc: "Enter daily profit distribution", date: "Date", autoDistribute: "Auto Distribute", liveTotal: "Transaction Total", saveBtn: "Save", updateBtn: "Update", cancelEdit: "Cancel",
        historyTitle: "History", exportBtn: "Export", filterFrom: "From", filterTo: "To", applyFilter: "Apply", resetFilter: "Reset", clearBtn: "Clear",
        thDate: "Date", thMonth: "Month", thNet: "Net Profit", thActions: "Actions", emptyData: "No Data",
        manageCapital: "Manage Capital", capAmount: "Amount", capIncrease: "Deposit", capDecrease: "Withdraw", capType: "Type", capNote: "Note", saveCapBtn: "Save",
        addPartnerTitle: "Manage Partner", pUsername: "Username", pPassword: "Password", pColor: "Color", pNameAr: "Name (Ar)", pNameEn: "Name (En)", addPartnerBtn: "Save",
        distributePercentages: "Distribute %", totalSum: "Total:", savePercBtn: "Confirm",
        errLogin: "Invalid credentials", succLogin: "Welcome", succSave: "Saved successfully", succDel: "Deleted", succImg: "Image saved locally"
      }
    };

    // --- Init & Theme ---
    window.addEventListener('load', () => {
      document.documentElement.setAttribute('data-theme', currentTheme);
      document.getElementById('themeBtn').className = currentTheme === 'dark' ? 'fa-regular fa-sun' : 'fa-regular fa-moon';
      applyLangUI();
    });

    window.toggleTheme = () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      localStorage.setItem('ironPeakTheme', currentTheme);
      document.getElementById('themeBtn').className = currentTheme === 'dark' ? 'fa-regular fa-sun' : 'fa-regular fa-moon';
      if(monthlyChartInstance) window.updateAnalytics();
    };

    window.toggleLanguage = () => {
      ironPeakLang = ironPeakLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('ironPeakLang', ironPeakLang);
      applyLangUI();
      if(currentUser) { window.renderDynamicUI(); window.updateTable(); }
    };

    const applyLangUI = () => {
      document.documentElement.lang = ironPeakLang;
      document.documentElement.dir = ironPeakLang === 'ar' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        if(dict[ironPeakLang][el.getAttribute('data-i18n')]) el.innerText = dict[ironPeakLang][el.getAttribute('data-i18n')];
      });
    };

    const showToast = (msg, type='success') => {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check':'fa-times'}"></i> <span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(()=>t.classList.add('show'),10);
      setTimeout(()=>{t.classList.remove('show'); setTimeout(()=>t.remove(),400)},3000);
    };

    // --- Auth ---
    onAuthStateChanged(auth, async (user) => {
      if(user) {
        onSnapshot(doc(db, "users", user.uid), (d) => {
          if(d.exists()) {
            currentUser = d.data();
            startApp();
          }
        });
      } else {
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('loginBtnSpinner').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      let user = document.getElementById('loginUser').value.trim();
      if(!user.includes('@')) user += '@goldenpeak.com'; // append domain for simple username login
      try {
        await signInWithEmailAndPassword(auth, user, document.getElementById('loginPass').value);
        showToast(dict[ironPeakLang].succLogin);
      } catch(err) { showToast(dict[ironPeakLang].errLogin, 'error'); }
      document.getElementById('loginBtnSpinner').innerHTML = dict[ironPeakLang].loginBtn;
    });

    window.logout = () => signOut(auth);

    // --- Boot App & Realtime DB ---
    const startApp = () => {
      document.getElementById('loginScreen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        
        document.getElementById('currentUserDisplay').innerText = ironPeakLang === 'ar' ? currentUser.nameAr : currentUser.nameEn;
        
        // Load Local Storage Image
        const localImg = localStorage.getItem('profile_' + currentUser.partnerId);
        if(localImg) {
          document.getElementById('navProfilePic').src = localImg;
          document.getElementById('navProfilePic').style.display = 'block';
        }

        if(currentUser.role === 'admin') {
          document.getElementById('navInput').style.display = 'flex';
          document.getElementById('navAdmin').style.display = 'flex';
        }

        // Listeners
        onSnapshot(query(collection(db, "users"), where("role", "==", "partner")), snap => {
          ironPeakPartners = {};
          snap.forEach(d => ironPeakPartners[d.data().partnerId] = {uid: d.id, ...d.data()});
          window.renderDynamicUI();
        });

        onSnapshot(collection(db, "profits"), snap => {
          ironPeakData = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.timestamp - a.timestamp);
          filteredData = [...ironPeakData];
          window.updateTable();
          if(monthlyChartInstance) window.updateAnalytics();
        });

        onSnapshot(collection(db, "capital"), snap => {
          ironPeakCapital = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=> new Date(b.date) - new Date(a.date));
          if(currentUser.role==='admin') window.renderAdminCapital();
          if(monthlyChartInstance) window.updateAnalytics();
        });

        window.switchTab('analytics');
      }, 400);
    };

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab-content, .nav-link').forEach(e => e.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.getElementById('nav'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
      
      if(tab === 'analytics') window.updateAnalytics();
      if(tab === 'market' && !document.getElementById('tv_script')) window.loadMarket('OANDA:XAUUSD');
      
      const hr = new Date().getHours();
      let g = 'greetingMorning'; if(hr>=12) g = 'greetingAfternoon'; if(hr>=17) g = 'greetingEvening';
      document.getElementById('greetingName').innerHTML = `${dict[ironPeakLang][g]} <span style="color:var(--gold-premium)">${ironPeakLang==='ar'?currentUser.nameAr:currentUser.nameEn}</span>`;
    };

    /* --- Forms & Dynamic UI --- */
    window.renderDynamicUI = () => {
      // 1. Entry Form
      const c = document.getElementById('dynamicPartnerInputs'); c.innerHTML = '';
      Object.values(ironPeakPartners).forEach(p => {
        c.innerHTML += `
          <div class="form-group" style="margin-bottom:25px;">
            <div class="stepper-wrapper">
              <label class="stepper-label" style="color:${p.color}">${dict[ironPeakLang].profitShare} ${ironPeakLang==='ar'?p.nameAr:p.nameEn} (${p.percentage}%)</label>
              <button type="button" class="stepper-btn" onclick="window.stepVal('profit_${p.partnerId}', -10)"><i class="fa-solid fa-minus"></i></button>
              <input type="number" id="profit_${p.partnerId}" class="stepper-input profit-input" step="0.01" required placeholder="0.00">
              <button type="button" class="stepper-btn" onclick="window.stepVal('profit_${p.partnerId}', 10)"><i class="fa-solid fa-plus"></i></button>
            </div>
          </div>`;
      });
      document.querySelectorAll('.profit-input').forEach(i => i.addEventListener('input', window.calcTotal));

      // 2. Table Headers
      let th = `<th>${dict[ironPeakLang].thDate}</th><th>${dict[ironPeakLang].thMonth}</th>`;
      Object.values(ironPeakPartners).forEach(p => th += `<th>${ironPeakLang==='ar'?p.nameAr:p.nameEn}</th><th>%</th>`);
      th += `<th>${dict[ironPeakLang].thNet}</th>`;
      if(currentUser && currentUser.role==='admin') th += `<th>${dict[ironPeakLang].thActions}</th>`;
      document.getElementById('tableHeaderRow').innerHTML = th;

      // 3. Admin Percentages
      if(currentUser && currentUser.role==='admin') {
        const list = document.getElementById('adminPercentagesList'); list.innerHTML = '';
        Object.values(ironPeakPartners).forEach(p => {
          list.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--glass-highlight); padding:15px; border-radius:12px;">
              <div style="display:flex; align-items:center; gap:10px;">
                ${localStorage.getItem('profile_'+p.partnerId) ? `<img src="${localStorage.getItem('profile_'+p.partnerId)}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">` : `<div style="width:15px;height:15px;border-radius:50%;background:${p.color}"></div>`}
                <strong>${ironPeakLang==='ar'?p.nameAr:p.nameEn}</strong>
              </div>
              <div style="display:flex; align-items:center; gap:5px;">
                <input type="number" id="perc_${p.partnerId}" class="form-control perc-input" step="0.001" value="${p.percentage}" style="width:90px; padding:10px; text-align:center;">
                <strong>%</strong>
                <button type="button" style="background:none; border:none; color:var(--danger); cursor:pointer; padding:5px;" onclick="window.delPartner('${p.uid}')"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>`;
        });
        document.querySelectorAll('.perc-input').forEach(i => i.addEventListener('input', window.valPerc));
        window.valPerc();
      }
    };

    window.stepVal = (id, amt) => { const i = document.getElementById(id); i.value = (parseFloat(i.value||0)+amt).toFixed(2); window.calcTotal(); };
    window.calcTotal = () => {
      let sum = 0; document.querySelectorAll('.profit-input').forEach(i => sum += parseFloat(i.value||0));
      document.getElementById('liveTotalAmount').innerText = sum.toFixed(2);
    };

    document.getElementById('masterNetProfit').addEventListener('input', (e) => {
      const t = parseFloat(e.target.value) || 0;
      Object.values(ironPeakPartners).forEach(p => {
        const i = document.getElementById(`profit_${p.partnerId}`);
        if(i) i.value = t ? (t * (p.percentage/100)).toFixed(2) : "";
      });
      window.calcTotal();
    });

    document.getElementById('entryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const dVal = document.getElementById('date').value;
      const dObj = new Date(dVal);
      const mAr = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"][dObj.getMonth()] + " " + dObj.getFullYear();
      const mEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][dObj.getMonth()] + " " + dObj.getFullYear();
      
      let total = 0; const dist = {};
      Object.keys(ironPeakPartners).forEach(k => { const v = parseFloat(document.getElementById(`profit_${k}`).value)||0; dist[k] = v; total+=v; });
      
      const payload = { date: dVal, monthAr: mAr, monthEn: mEn, netProfit: total, profits: dist, timestamp: dObj.getTime() };
      const editId = document.getElementById('editEntryId').value;
      
      if(editId) { await setDoc(doc(db, "profits", editId), payload); window.cancelEditing(); }
      else { await setDoc(doc(collection(db, "profits")), payload); }
      
      showToast(dict[ironPeakLang].succSave);
      e.target.reset(); window.calcTotal(); document.getElementById('date').valueAsDate = new Date();
    });

    window.editEntry = (id) => {
      const p = ironPeakData.find(x => x.id === id); if(!p) return;
      window.switchTab('input');
      document.getElementById('editEntryId').value = p.id;
      document.getElementById('date').value = p.date;
      Object.keys(ironPeakPartners).forEach(k => { const i = document.getElementById(`profit_${k}`); if(i) i.value = p.profits[k]||0; });
      window.calcTotal();
      document.getElementById('saveDataBtn').innerHTML = `<i class="fa-solid fa-pen"></i> ${dict[ironPeakLang].updateBtn}`;
      document.getElementById('cancelEditBtn').style.display = 'block';
    };
    window.cancelEditing = () => {
      document.getElementById('entryForm').reset(); document.getElementById('editEntryId').value = '';
      window.calcTotal(); document.getElementById('date').valueAsDate = new Date();
      document.getElementById('saveDataBtn').innerHTML = `<i class="fa-solid fa-check"></i> ${dict[ironPeakLang].saveBtn}`;
      document.getElementById('cancelEditBtn').style.display = 'none';
    };
    window.deleteEntry = (id) => { if(confirm('تأكيد الحذف؟')) deleteDoc(doc(db, "profits", id)); };

    /* --- History Table --- */
    window.updateTable = () => {
      const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
      if(filteredData.length === 0) return tbody.innerHTML = `<tr><td colspan="10" style="text-align:center">${dict[ironPeakLang].emptyData}</td></tr>`;
      
      filteredData.forEach((row, idx) => {
        const tr = document.createElement('tr'); tr.style.animation = `slideUp 0.3s ease forwards ${idx*0.02}s`; tr.style.opacity = '0';
        let html = `<td>${row.date}</td><td style="color:var(--text-muted)">${ironPeakLang==='ar'?row.monthAr:row.monthEn}</td>`;
        
        Object.keys(ironPeakPartners).forEach(k => {
          const v = row.profits[k]||0; const p = row.netProfit>0 ? ((v/row.netProfit)*100).toFixed(1) : 0;
          const c = ironPeakPartners[k].color;
          html += `<td>${v.toLocaleString()}</td><td><span class="badge" style="color:${c}; border:1px solid ${c}40">${p}%</span></td>`;
        });
        html += `<td class="net-profit-cell">${row.netProfit.toLocaleString()}</td>`;
        if(currentUser.role==='admin') {
          html += `<td><button class="icon-btn" style="width:30px;height:30px;border:none" onclick="window.editEntry('${row.id}')"><i class="fa-solid fa-pen"></i></button><button class="icon-btn" style="width:30px;height:30px;border:none;color:var(--danger)" onclick="window.deleteEntry('${row.id}')"><i class="fa-solid fa-trash"></i></button></td>`;
        }
        tr.innerHTML = html; tbody.appendChild(tr);
      });
    };

    window.applyFilter = () => {
      const f = document.getElementById('filterFrom').value, t = document.getElementById('filterTo').value;
      filteredData = ironPeakData.filter(x => (!f || x.date >= f) && (!t || x.date <= t));
      window.updateTable();
    };
    window.resetFilter = () => { document.getElementById('filterFrom').value=''; document.getElementById('filterTo').value=''; filteredData=[...ironPeakData]; window.updateTable(); };

    /* --- Analytics --- */
    window.updateAnalytics = () => {
      const grid = document.getElementById('analyticsCardsGrid');
      let tNet = 0; const dSet = new Set(); const pTotals = {}; const mData = {}; const dData = {};
      Object.keys(ironPeakPartners).forEach(k => pTotals[k]=0);
      
      ironPeakData.forEach(i => {
        tNet += i.netProfit; dSet.add(i.date);
        const mk = ironPeakLang==='ar'?i.monthAr:i.monthEn;
        if(!mData[mk]) { mData[mk]={sort:i.date.substring(0,7)}; Object.keys(ironPeakPartners).forEach(k=>mData[mk][k]=0); }
        if(!dData[i.date]) dData[i.date]=0; dData[i.date]+=i.netProfit;
        
        Object.keys(ironPeakPartners).forEach(k => { if(i.profits[k]){ pTotals[k]+=i.profits[k]; mData[mk][k]+=i.profits[k]; } });
      });

      let aCap = 0; ironPeakCapital.forEach(c => aCap += (c.type==='increase'?c.amount:-c.amount));

      let cards = `
        <div class="stat-card premium-card" style="border-bottom-color:var(--info)"><i class="fa-solid fa-building-columns stat-icon" style="color:var(--info)"></i><div class="stat-title">${dict[ironPeakLang].activeCapital}</div><div class="stat-value">${aCap.toLocaleString()}</div></div>
        <div class="stat-card premium-card"><i class="fa-solid fa-vault stat-icon" style="color:var(--text-main)"></i><div class="stat-title">${dict[ironPeakLang].netProfit}</div><div class="stat-value">${tNet.toLocaleString()}</div></div>
      `;
      Object.values(ironPeakPartners).forEach(p => {
        cards += `<div class="stat-card premium-card"><i class="fa-solid fa-user stat-icon" style="color:${p.color}"></i><div class="stat-title">${dict[ironPeakLang].profitShare} ${ironPeakLang==='ar'?p.nameAr:p.nameEn}</div><div class="stat-value" style="color:${p.color}">${pTotals[p.partnerId].toLocaleString()}</div></div>`;
      });
      grid.innerHTML = cards;

      // Charts
      Chart.defaults.color = currentTheme==='dark'?'#94A3B8':'#64748b'; Chart.defaults.font.family = "'Tajawal', 'Almarai', sans-serif";
      const mLbs = Object.keys(mData).sort((a,b)=>mData[a].sort.localeCompare(mData[b].sort));
      const sets = Object.values(ironPeakPartners).map(p => ({ label:ironPeakLang==='ar'?p.nameAr:p.nameEn, data:mLbs.map(m=>mData[m][p.partnerId]), backgroundColor:p.color, borderRadius:6 }));
      
      if(monthlyChartInstance) monthlyChartInstance.destroy();
      monthlyChartInstance = new Chart(document.getElementById('monthlyChart').getContext('2d'), { type:'bar', data:{labels:mLbs, datasets:sets}, options:{responsive:true, maintainAspectRatio:false, scales:{x:{stacked:true}, y:{stacked:true}}} });

      const dLbs = Object.keys(dData).sort();
      const dVals = []; const cVals = []; let sum=0; dLbs.forEach(d => { dVals.push(dData[d]); sum+=dData[d]; cVals.push(sum); });
      
      if(dailyChartInstance) dailyChartInstance.destroy();
      dailyChartInstance = new Chart(document.getElementById('dailyCumulativeChart').getContext('2d'), {
        type:'bar', data:{ labels:dLbs, datasets:[ {type:'line', label:'Cumulative', data:cVals, borderColor:'#D4AF37', tension:0.4}, {type:'bar', label:'Daily', data:dVals, backgroundColor:'#00A693', borderRadius:4} ] },
        options:{responsive:true, maintainAspectRatio:false}
      });
    };

    /* --- Admin Logic --- */
    // Capital
    document.getElementById('capitalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await setDoc(doc(collection(db, "capital")), {
        date: document.getElementById('cap_date').value, amount: parseFloat(document.getElementById('cap_amount').value),
        type: document.getElementById('cap_type').value, note: document.getElementById('cap_note').value
      });
      showToast(dict[ironPeakLang].succSave); e.target.reset(); document.getElementById('cap_date').valueAsDate = new Date();
    });
    window.renderAdminCapital = () => {
      const lst = document.getElementById('capitalHistoryList'); lst.innerHTML = '';
      ironPeakCapital.forEach(c => {
        const up = c.type === 'increase';
        lst.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid var(--glass-border);">
          <div><strong style="color:${up?'var(--success)':'var(--danger)'}"><i class="fa-solid fa-arrow-${up?'up':'down'}"></i> ${up?dict[ironPeakLang].capIncrease:dict[ironPeakLang].capDecrease}</strong><div style="font-size:0.85rem; color:var(--text-muted)">${c.date} ${c.note?'- '+c.note:''}</div></div>
          <strong style="font-size:1.1rem">${c.amount}</strong>
        </div>`;
      });
    };

    // Partners & Image Local Storage
    document.getElementById('addPartnerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('p_username').value.trim().toLowerCase();
      const email = id + '@goldenpeak.com';
      const file = document.getElementById('p_photo').files[0];

      // حفظ الصورة في LocalStorage للعميل
      if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          localStorage.setItem('profile_' + id, evt.target.result);
          showToast(dict[ironPeakLang].succImg);
        };
        reader.readAsDataURL(file);
      }

      try {
        let u;
        try { u = await createUserWithEmailAndPassword(secondaryAuth, email, document.getElementById('p_password').value); } catch(err){}
        await setDoc(doc(db, "users", u ? u.user.uid : id), { // fallback uid if already exists
          email: email, partnerId: id, role: 'partner', percentage: 0,
          nameAr: document.getElementById('p_nameAr').value, nameEn: document.getElementById('p_nameEn').value, color: document.getElementById('p_color').value
        }, {merge: true});
        showToast(dict[ironPeakLang].succSave); e.target.reset();
      } catch(err) { showToast(err.message, 'error'); }
    });

    window.valPerc = () => {
      let sum = 0; document.querySelectorAll('.perc-input').forEach(i => sum += parseFloat(i.value||0));
      const ok = Math.abs(sum-100)<0.01;
      document.getElementById('percTotalDisplay').innerText = sum.toFixed(2)+'%';
      document.getElementById('percTotalDisplay').style.color = ok ? 'var(--success)' : 'var(--danger)';
      document.getElementById('savePercBtn').disabled = !ok;
    };
    document.getElementById('percentagesForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.querySelectorAll('.perc-input').forEach(async (i) => {
        const pid = i.id.replace('perc_','');
        if(ironPeakPartners[pid]) await setDoc(doc(db, "users", ironPeakPartners[pid].uid), { percentage: parseFloat(i.value) }, {merge:true});
      });
      showToast(dict[ironPeakLang].succSave);
    });
    window.delPartner = (uid) => { if(confirm('تأكيد الحذف؟')) deleteDoc(doc(db, "users", uid)); };

    /* --- Hidden Init Button (The Magic Setup) --- */
    window.initSystem = async () => {
      const c = confirm("هل تريد تهيئة النظام بإنشاء حساب الإدارة وحسابات (محمد، راكان، عمر)؟\nسيتم استخدام الباسورد الافتراضي (20262026) للشركاء.");
      if(!c) return;
      const users = [
        { e:'admin@goldenpeak.com', p:'admin2026', id:'admin', r:'admin', nar:'مدير النظام', nen:'Admin', c:'#fff', perc:0 },
        { e:'omar@goldenpeak.com', p:'20262026', id:'omar', r:'partner', nar:'عمر', nen:'Omar', c:'#10b981', perc:33.4 },
        { e:'rakan@goldenpeak.com', p:'20262026', id:'rakan', r:'partner', nar:'راكان', nen:'Rakan', c:'#D4AF37', perc:33.3 },
        { e:'mohammad@goldenpeak.com', p:'20262026', id:'mohammad', r:'partner', nar:'محمد', nen:'Mohammad', c:'#3b82f6', perc:33.3 }
      ];
      for(let u of users) {
        try {
          let cred = await createUserWithEmailAndPassword(secondaryAuth, u.e, u.p);
          await setDoc(doc(db, "users", cred.user.uid), { email:u.e, partnerId:u.id, role:u.r, nameAr:u.nar, nameEn:u.nen, color:u.c, percentage:u.perc });
        } catch(err) { /* ignore already exists */ }
      }
      alert('تمت تهيئة قاعدة البيانات بنجاح! يمكنك الدخول كـ admin أو omar');
    };

    /* --- TV Market --- */
    window.loadMarket = (symbol) => {
      const c = document.getElementById('tv_container'); c.innerHTML = '';
      const s = document.createElement('script'); s.id = 'tv_script'; s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js'; s.async = true;
      s.innerHTML = JSON.stringify({ "symbols": [[symbol]], "chartType": "area", "lineWidth": 2, "colorTheme": currentTheme, "autosize": true, "isTransparent": true });
      c.appendChild(s);
    };

    /* --- Excel --- */
    window.exportToExcel = () => {
      const d = filteredData.map(r => {
        let obj = { "التاريخ": r.date, "صافي الربح": r.netProfit };
        Object.keys(ironPeakPartners).forEach(k => { obj[ironPeakLang==='ar'?ironPeakPartners[k].nameAr:ironPeakPartners[k].nameEn] = r.profits[k]||0; });
        return obj;
      });
      const ws = XLSX.utils.json_to_sheet(d), wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Report");
      XLSX.writeFile(wb, `GoldenPeak_Report.xlsx`);
    };
  </script>
</body>
</html>
